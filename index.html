<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE 2027 Study Tracker</title>
    
    <style>
        /* WHY: Universal reset. QOL: Prevents default browser margins from ruining the clean layout. */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* WHY: Set up the dark mode theme. QOL: Reduces eye strain during late-night study sessions. */
        body {
            background-color: #121212; /* Deep dark background */
            color: #e0e0e0; /* Off-white text for high contrast without glare */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* WHY: Container for the top countdown. QOL: Keeps your ultimate goal front and center. */
        #countdown-container {
            font-size: 1.2rem;
            color: #ff9800; /* Motivational orange */
            margin-bottom: 2rem;
            text-align: center;
            font-weight: bold;
        }

        /* WHY: Container for the dynamic quotes. QOL: Provides continuous motivation without cluttering the screen. */
        #quote-container {
            font-size: 1.1rem;
            font-style: italic;
            color: #b3b3b3;
            text-align: center;
            max-width: 800px;
            margin-bottom: 3rem;
            min-height: 60px; /* WHY: Fixed min-height. QOL: Prevents the page layout from jumping around when quote lengths change. */
        }

        /* WHY: The massive timer display. QOL: Easily readable at a glance, even if the window is snapped to the side of your screen. */
        #timer-display {
            font-size: 6rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums; /* WHY: Tabular nums. QOL: Stops the timer text from wiggling left/right as numbers change width. */
            letter-spacing: 2px;
            margin-bottom: 2rem;
            color: #ffffff;
        }

        /* WHY: Button layout container. QOL: Keeps buttons neatly aligned and spaced. */
        .controls { display: flex; gap: 1rem; margin-bottom: 3rem; }

        /* WHY: Base button styling. QOL: Large click targets, satisfying hover effects for tactile feedback. */
        button {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease; /* WHY: Smooth transition. QOL: Feels premium and responsive to use. */
        }
        
        /* WHY: Distinct button colors. QOL: Prevents accidental clicks. Green = Go, Yellow = Wait, Red = Stop. */
        #btn-start { background-color: #4caf50; color: white; }
        #btn-start:hover { background-color: #45a049; }
        
        #btn-pause { background-color: #ffc107; color: black; }
        #btn-pause:hover { background-color: #ffb300; }
        
        #btn-stop { background-color: #f44336; color: white; }
        #btn-stop:hover { background-color: #e53935; }

        /* WHY: Stats grid container. QOL: Organizes complex data into a readable dashboard. */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* WHY: Auto-fit grid. QOL: Automatically adjusts layout for mobile vs desktop. */
            gap: 1.5rem;
            width: 100%;
            max-width: 800px;
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* WHY: Individual stat boxes. QOL: Distinct separation of data points. */
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; margin-top: 0.5rem; color: #4fc3f7; }

        /* WHY: The daily rank/status message. QOL: Gives immediate psychological feedback on your day's effort. */
        #daily-status {
            grid-column: 1 / -1; /* Spans the whole grid row */
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #333;
        }

        /* WHY: Custom Modal (Popup) styling. QOL: Built-in browser alerts (alert()) look ugly and block the thread. This looks modern and integrated. */
        #session-modal {
            display: none; /* Hidden by default */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2c2c2c;
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            max-width: 500px;
            border: 1px solid #4caf50;
        }
        .modal-content p { font-size: 1.2rem; margin-bottom: 2rem; line-height: 1.5; }
        .modal-content button { background: #4caf50; color: white; }
    </style>
</head>
<body>

            "Shriyash, \"Roj ek kadam — Shri Ji baaki sambhalti hain.\"",
            "Shriyash, \"Mera best bhi unki kripa hai — apna nahi keh sakta.\"",
            "Shriyash, \"Unka naam lena — yahi meri consistency hai.\"",
            "Shriyash, \"Agar main kuch bhi achieve karun — Shri Ji ne kiya, main nahi.\"",
            "Shriyash, \"Ghabrana nahi — Shri Ji hain na.\"",
            "Shriyash, \"Unke bina ek pal bhi theek se nahi guzarta.\"",
            "Shriyash, \"Meri sab zimmedaariyan — unke haath mein de di hain.\"",
            "Shriyash, \"Jo mujhe pata nahi — unhe pata hai, bas.\"",
            "Shriyash, \"Roz unhe bolna — app dekhlo, main hoon hi nahi yahan.\"",
            "Shriyash, \"Meri taraf se kuch nahi — unki taraf se sab kuch.\"",
            "Shriyash, \"Unka naam meri sabse badi tayyaari hai.\"",
            "Shriyash, \"Apni kamzori dekhta hoon toh — unki zaroorat aur zyada lagti hai.\""
        ];

        // --- TIMER STATE VARIABLES ---
        let startTime = 0; // WHY: Stores the absolute exact millisecond the timer started. QOL: Allows calculation of time even if the browser aggressively throttles the tab.
        let totalElapsed = 0; // WHY: Accumulates time. QOL: Needed so pauses don't reset your progress.
        let timerInterval = null; // WHY: Holds the setInterval ID. QOL: Allows us to clear/stop the loop precisely.
        let isRunning = false; // WHY: Boolean lock. QOL: Prevents clicking 'Start' twice and creating runaway phantom timers.
        let actualSessionStartString = ""; // WHY: Captures wall-clock start time. QOL: Required for the final "You studied between X and Y" message.

        // --- DOM ELEMENTS ---
        const display = document.getElementById('timer-display');
        const quoteEl = document.getElementById('quote-container');

        // --- CORE TIMER LOGIC ---
        
        // WHY: Formatting function (ms -> HH:MM:SS). QOL: Humans read hours/mins/secs, not milliseconds. PadStart ensures "09" instead of "9".
        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // WHY: The core update loop. QOL: Runs frequently to update UI. Because it relies on Date.now(), if the tab is backgrounded and misses ticks, it instantly "catches up" the second you open the tab again.
        function updateDisplay() {
            if (isRunning) {
                totalElapsed = Date.now() - startTime;
            }
            display.textContent = formatTime(totalElapsed);
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            if (!isRunning) { // WHY: Check if already running. QOL: Protects state.
                isRunning = true;
                startTime = Date.now() - totalElapsed; // WHY: Subtract elapsed. QOL: If resuming from pause, this shifts the "startTime" back so the math perfectly accounts for time already studied.
                if (totalElapsed === 0) {
                    actualSessionStartString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); // WHY: Format to short time. QOL: Looks cleaner (e.g., "10:30 AM" instead of a huge string).
                }
                timerInterval = setInterval(updateDisplay, 100); // WHY: 100ms update. QOL: Fast enough to feel instantly responsive, slow enough to not drain battery.
            }
        });

        document.getElementById('btn-pause').addEventListener('click', () => {
            if (isRunning) {
                isRunning = false;
                clearInterval(timerInterval); // WHY: Stops the loop. QOL: Pauses tracking immediately for your break.
                totalElapsed = Date.now() - startTime; // WHY: Final calculation before stopping loop. QOL: Ensures absolute precision.
                updateDisplay(); // WHY: One last UI update. QOL: Secures the visual state.
            }
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            if (totalElapsed === 0 && !isRunning) return; // WHY: Guard clause. QOL: Clicking stop on 00:00:00 does nothing, preventing blank entries.
            
            // WHY: Force a final update if running. QOL: Captures the exact millisecond you clicked stop.
            if (isRunning) {
                isRunning = false;
                clearInterval(timerInterval);
                totalElapsed = Date.now() - startTime;
            }

            let actualSessionEndString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let durationString = formatTime(totalElapsed);

            // WHY: Save function call. QOL: Persists your hard work to local storage so a page refresh doesn't destroy your history.
            saveSessionToLog(totalElapsed);

            // WHY: Show custom modal. QOL: Alert() blocks JS thread and is annoying. Modals are seamless.
            document.getElementById('modal-text').innerText = `You studied between ${actualSessionStartString} and ${actualSessionEndString}.\nYou studied for ${durationString}.`;
            document.getElementById('session-modal').style.display = 'flex';

            // WHY: Reset state. QOL: Readies the tracker for the next session.
            totalElapsed = 0;
            updateDisplay();
            updateStats(); // WHY: Update dashboard. QOL: You instantly see your new totals increase.
        });

        // WHY: Closes the modal. QOL: Gives you control to dismiss the message.
        function closeModal() {
            document.getElementById('session-modal').style.display = 'none';
        }

        // --- DATA LOGGING & STATS LOGIC ---
        
        // WHY: LocalStorage wrapper. QOL: Saves data directly to the browser. Works completely offline, requires no database or backend.
        function saveSessionToLog(durationMs) {
            let today = new Date().toISOString().split('T')[0]; // WHY: Gets YYYY-MM-DD. QOL: Standardized key for grouping daily study time.
            let logs = JSON.parse(localStorage.getItem('gate_study_logs')) || {};
            
            if (!logs[today]) logs[today] = 0;
            logs[today] += durationMs; // Add new session time to today's total
            
            localStorage.setItem('gate_study_logs', JSON.stringify(logs));
        }

        // WHY: Formats ms to 'Xh Ym'. QOL: "5h 30m" is vastly easier to read on a dashboard than "05:30:00".
        function formatStatsTime(ms) {
            let totalMins = Math.floor(ms / 60000);
            let hours = Math.floor(totalMins / 60);
            let mins = totalMins % 60;
            return `${hours}h ${mins}m`;
        }

        // WHY: The heavy lifting for the dashboard. QOL: Automatically calculates daily, weekly, and monthly progress based on real calendar days.
        function updateStats() {
            let logs = JSON.parse(localStorage.getItem('gate_study_logs')) || {};
            let now = new Date();
            let todayStr = now.toISOString().split('T')[0];
            
            let todayMs = logs[todayStr] || 0;
            
            // Week Calculation
            // WHY: Determine start of current week (Monday). QOL: Aligns with standard student planning cycles.
            let dayOfWeek = now.getDay();
            let distanceToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1; 
            let startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - distanceToMonday);
            startOfWeek.setHours(0,0,0,0);

            let weekMs = 0;
            let monthMs = 0;
            let daysStudiedThisMonth = 0;

            let currentMonth = now.getMonth();
            let currentYear = now.getFullYear();

            // WHY: Loop through all saved logs. QOL: Dynamically bucket time into Week and Month without complex database queries.
            for (const [dateStr, ms] of Object.entries(logs)) {
                let logDate = new Date(dateStr);
                
                // Week
                if (logDate >= startOfWeek) {
                    weekMs += ms;
                }
                
                // Month
                if (logDate.getMonth() === currentMonth && logDate.getFullYear() === currentYear) {
                    monthMs += ms;
                    daysStudiedThisMonth++;
                }
            }

            // Averages
            // WHY: Calculate average. QOL: Shows your realistic pace, ignoring days you haven't lived yet.
            let avgMs = daysStudiedThisMonth === 0 ? 0 : monthMs / daysStudiedThisMonth;

            // Update UI
            document.getElementById('stat-today').innerText = formatStatsTime(todayMs);
            document.getElementById('stat-week').innerText = formatStatsTime(weekMs);
            document.getElementById('stat-month').innerText = formatStatsTime(monthMs);
            document.getElementById('stat-avg').innerText = formatStatsTime(avgMs);

            // Motivational Logic
            // WHY: Converts ms to hours for conditional checks. QOL: Directly implements your requested tier system.
            let todayHours = todayMs / (1000 * 60 * 60);
            let statusEl = document.getElementById('daily-status');
            
            if (todayHours < 5) {
                statusEl.innerText = "Dusht & Paapi";
                statusEl.style.color = "#f44336"; // Red
            } else if (todayHours >= 5 && todayHours < 8) {
                statusEl.innerText = "Good. Keep Going.";
                statusEl.style.color = "#ffc107"; // Yellow
            } else if (todayHours >= 8 && todayHours < 11) {
                statusEl.innerText = "Very good. But need more.";
                statusEl.style.color = "#4caf50"; // Green
            } else {
                statusEl.innerText = "Ranker!";
                statusEl.style.color = "#00bcd4"; // Cyan/Diamond
            }
        }

        // --- GATE COUNTDOWN LOGIC ---
        
        // WHY: Dedicated countdown function. QOL: Reminds you of the ultimate deadline every single day.
        function updateGateCountdown() {
            const targetDate = new Date('February 1, 2027 00:00:00').getTime();
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('gate-countdown').innerText = "IT'S EXAM DAY!";
                return;
            }

            // WHY: Math.floor rounding. QOL: Standardizes remaining time into readable chunks.
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('gate-countdown').innerText = `${days} Days, ${hours} Hours, ${minutes} Mins`;
        }

        // --- QUOTE ROTATION LOGIC ---
        
        // WHY: Random quote picker. QOL: Provides fresh spiritual/motivational context every few minutes so you don't go numb to a static string.
        function rotateQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            quoteEl.innerText = quotes[randomIndex];
        }

        // --- INITIALIZATION ---
        
        // WHY: Run these immediately on page load. QOL: Ensures the dashboard is populated with accurate data the millisecond you open the tab.
        updateGateCountdown();
        rotateQuote();
        updateStats();
        
        // WHY: Set intervals for background updates. QOL: Keeps the countdown and quotes fresh even if you leave the tab open for 14 hours.
        setInterval(updateGateCountdown, 60000); // Update countdown every minute
        setInterval(rotateQuote, 300000); // Change quote every 5 minutes

        // WHY: Tab visibility listener. QOL: If the browser massively throttles JS in the background, this forces an immediate UI sync the exact moment you click back into the tab.
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                if (isRunning) updateDisplay();
                updateStats(); // Catch up on any day rollovers
            }
        });

    </script>
</body>
</html>
