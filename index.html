<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Timer — GATE CS & DA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #09090e;
      --surface:   #111119;
      --border:    #1e1e2e;
      --gold:      #c9a84c;
      --gold-dim:  #8a6f30;
      --text:      #dcd9d0;
      --muted:     #55556a;
      --white:     #f0ede6;
      --red:       #b85450;
      --green:     #5a8a6a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 24px 60px;
      position: relative;
    }

    /* ── subtle background grain ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── GATE countdown bar ── */
    #countdown-bar {
      width: 100%;
      max-width: 680px;
      margin-top: 36px;
      padding: 14px 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    #countdown-bar .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #countdown-bar .days {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    #countdown-bar .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border);
    }

    /* ── main card ── */
    #card {
      width: 100%;
      max-width: 680px;
      margin-top: 20px;
      padding: 60px 48px 52px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 15px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
    }

    /* ── timer display ── */
    #timer {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(80px, 18vw, 130px);
      letter-spacing: -0.01em;
      color: var(--white);
      line-height: 1;
      transition: color 0.4s ease;
      user-select: none;
    }

    #timer.running { color: var(--white); }
    #timer.stopped { color: var(--gold); }

    .timer-sub {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      height: 16px;
      transition: opacity 0.3s;
    }

    /* ── divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 44px 0 40px;
    }

    /* ── buttons ── */
    #controls {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 14px 32px;
      background: transparent;
      color: var(--muted);
    }

    button:hover { border-color: var(--muted); color: var(--text); }

    #btn-start {
      border-color: var(--gold-dim);
      color: var(--gold);
      padding: 16px 48px;
      font-size: 13px;
    }
    #btn-start:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); }

    #btn-stop  { color: var(--red); border-color: #4a2828; }
    #btn-stop:hover  { background: var(--red); color: var(--white); border-color: var(--red); }

    #btn-reset { color: var(--muted); }
    #btn-reset:hover { border-color: var(--muted); }

    button:disabled {
      opacity: 0.25;
      pointer-events: none;
    }

    /* ── output message ── */
    #output {
      margin-top: 36px;
      width: 100%;
      padding: 20px 24px;
      border: 1px solid var(--green);
      border-radius: 4px;
      background: rgba(90, 138, 106, 0.07);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: #8abf9a;
      display: none;
      text-align: center;
      letter-spacing: 0.01em;
    }

    #output.visible { display: block; animation: fadeIn 0.5s ease; }

    #output strong {
      color: #aad4b4;
      font-weight: 500;
    }

    /* ── quotes ── */
    #quotes {
      width: 100%;
      max-width: 680px;
      margin-top: 20px;
      padding: 28px 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    #quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.6;
      font-style: italic;
      transition: opacity 0.5s;
    }

    #quote-author {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      transition: opacity 0.5s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-out { opacity: 0 !important; }

    /* ── stats panel ── */
    #stats {
      width: 100%;
      max-width: 680px;
      margin-top: 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    #stats-header {
      padding: 18px 32px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #stats-header .s-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    #today-badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      transition: all 0.4s ease;
    }

    #today-badge.rank-ranker  { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid var(--gold-dim); }
    #today-badge.rank-vgood   { background: rgba(90,138,106,0.15); color: #8abf9a;     border: 1px solid #3a6a4a; }
    #today-badge.rank-good    { background: rgba(90,138,106,0.10); color: #6a9f7a;     border: 1px solid #2a5a3a; }
    #today-badge.rank-paapi   { background: rgba(184,84,80,0.15);  color: var(--red);  border: 1px solid #6a2828; }
    #today-badge.rank-none    { background: transparent; color: var(--muted);          border: 1px solid var(--border); }

    #stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .stat-cell {
      padding: 20px 24px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-cell:last-child { border-right: none; }

    .stat-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      color: var(--white);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .stat-value.dim { color: var(--muted); font-size: 13px; }

    #stats-today-row {
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #today-detail {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    #today-detail strong {
      color: var(--text);
      font-weight: 400;
    }

    @media (max-width: 540px) {
      #stats-grid { grid-template-columns: 1fr 1fr; }
      .stat-cell:nth-child(2) { border-right: none; }
      .stat-cell:nth-child(3) { border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <!-- GATE Countdown -->
  <div id="countdown-bar">
    <span class="label">GATE 2027 CS &amp; DA</span>
    <span class="dot"></span>
    <span class="days" id="gate-days">— days remaining</span>
    <span class="dot"></span>
    <span class="label">Stay the course</span>
  </div>

  <!-- Main Card -->
  <div id="card">
    <p class="page-title">Study Timer</p>

    <div id="timer">00:00:00</div>
    <div class="timer-sub" id="timer-sub"></div>

    <div class="divider"></div>

    <div id="controls">
      <button id="btn-stop"  disabled>Stop</button>
      <button id="btn-start">Start</button>
      <button id="btn-reset" disabled>Reset</button>
    </div>

    <div id="output"></div>
  </div>


  <!-- Stats Panel -->
  <div id="stats">
    <div id="stats-header">
      <span class="s-title">Study Log</span>
      <span id="today-badge" class="rank-none">—</span>
    </div>
    <div id="stats-grid">
      <div class="stat-cell">
        <span class="stat-label">Today</span>
        <span class="stat-value dim" id="stat-today">0h 0m</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">This Week</span>
        <span class="stat-value dim" id="stat-week">0h 0m</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">This Month</span>
        <span class="stat-value dim" id="stat-month">0h 0m</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">Daily Avg</span>
        <span class="stat-value dim" id="stat-avg">—</span>
      </div>
    </div>
    <div id="stats-today-row">
      <span id="today-detail">No sessions logged today yet.</span>
    </div>
  </div>

  <!-- Quote -->
  <div id="quotes">
    <div id="quote-text"></div>
    <div id="quote-author"></div>
  </div>

<script>
  /* ── GATE countdown ── */
  (function() {
    const gateDate = new Date('2027-02-06T09:00:00+05:30');
    const el = document.getElementById('gate-days');
    let gateInterval; // declared here so updateCountdown can reach it

    function updateCountdown() {
      const diff = gateDate - Date.now();
      if (diff <= 0) {
        el.textContent = 'GATE day is here!';
        clearInterval(gateInterval); // stop — no point firing forever after goal is reached
        return;
      }
      const days  = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins  = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      el.textContent = `${days}d ${hours}h ${mins}m remaining`;
    }
    updateCountdown();
    gateInterval = setInterval(updateCountdown, 1000); // assigned after declaration so updateCountdown can clear it
  })();

  /* ── Timer logic ── */
  const STORAGE_KEY = 'gate-timer:timerState';

  let interval       = null;
  let elapsed        = 0;      // total seconds accumulated across all pauses
  let elapsedAtPause = 0;      // snapshot of elapsed the moment we paused
  let runStartedAt   = null;   // Date.now() value when the current run segment began
  let sessionStart   = null;   // Date object: very first Start of this session
  let running        = false;

  const timerEl  = document.getElementById('timer');
  const subEl    = document.getElementById('timer-sub');
  const outputEl = document.getElementById('output');
  const btnStart = document.getElementById('btn-start');
  const btnStop  = document.getElementById('btn-stop');
  const btnReset = document.getElementById('btn-reset');

  /* ── helpers ── */
  function pad(n) { return String(n).padStart(2, '0'); }

  function formatDisplay(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    return `${pad(h)}:${pad(m)}:${pad(s % 60)}`;
  }

  function formatTime12(date) {
    let h = date.getHours(), m = date.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${pad(m)} ${ampm}`;
  }

  function formatDuration(s) {
    if (s < 60)   return `${s} second${s !== 1 ? 's' : ''}`;
    if (s < 3600) {
      const m = Math.floor(s / 60), sec = s % 60;
      return sec ? `${m} min ${sec} sec` : `${m} minute${m !== 1 ? 's' : ''}`;
    }
    const h   = Math.floor(s / 3600);
    const m   = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    let str = `${h} hour${h !== 1 ? 's' : ''}`;
    if (m)   str += ` ${m} min`;
    if (sec) str += ` ${sec} sec`;
    return str;
  }

  /* ── localStorage persistence ── */
  // BUG FIX: Previously, a page refresh or accidental tab close wiped the
  // entire session. Now we save state on every tick so it survives.

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        elapsedAtPause,
        runStartedAt,          // null when paused, a timestamp when running
        sessionStart: sessionStart ? sessionStart.getTime() : null,
        running
      }));
    } catch (e) { /* localStorage unavailable (private mode etc.) — degrade gracefully */ }
  }

  function clearState() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  }

  function restoreState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const s = JSON.parse(raw);

      // Validate — must be a non-negative finite number, else treat as 0
      elapsedAtPause = (typeof s.elapsedAtPause === 'number' && isFinite(s.elapsedAtPause) && s.elapsedAtPause >= 0)
        ? s.elapsedAtPause : 0;
      sessionStart   = s.sessionStart ? new Date(s.sessionStart) : null;

      const MAX_UNATTENDED_MS = 4 * 60 * 60 * 1000; // 4 hours
      const timeSinceLastSave  = Date.now() - (s.runStartedAt || 0);

      if (s.running && s.runStartedAt && timeSinceLastSave < MAX_UNATTENDED_MS) {
        // The timer was running when the page closed/refreshed and it was
        // recent enough to trust — resume as if it never stopped.
        runStartedAt = s.runStartedAt;
        startRunningUI();
      } else if (s.running && s.runStartedAt) {
        // Timer was "running" in storage but runStartedAt is very old (e.g.
        // browser was closed overnight). Treat as paused at last known elapsed.
        // We DO log the elapsed time — the user genuinely studied those hours
        // before the crash. Without this, the time shows on screen but is
        // silently lost from all stats (Today / Week / Month).
        elapsed = elapsedAtPause;
        timerEl.textContent = formatDisplay(elapsed);
        timerEl.classList.add('stopped');
        subEl.textContent = '';
        outputEl.innerHTML =
          `Session restored (paused). You had studied for <strong>${formatDuration(elapsed)}</strong>. Resume when ready. 🎯`;
        outputEl.classList.add('visible');
        btnStart.disabled = false;
        btnStop.disabled  = true;
        btnReset.disabled = false;
        // Fix up saved state so it reflects the paused reality
        runStartedAt = null;
        saveState();
        // Log the pre-crash segment so stats are not robbed of real study time.
        // elapsedAtPause here equals elapsed (no new segment yet), which is
        // exactly the time the user studied before the browser died.
        logSession(elapsed);
      } else if (elapsedAtPause > 0 && sessionStart) {
        // Timer was paused — restore the frozen display.
        elapsed = elapsedAtPause;
        timerEl.textContent = formatDisplay(elapsed);
        timerEl.classList.add('stopped');
        subEl.textContent = '';
        const dur = formatDuration(elapsed);
        outputEl.innerHTML =
          `Session restored. You have studied for <strong>${dur}</strong> so far. Keep going! 🎯`;
        outputEl.classList.add('visible');
        btnStart.disabled = false;
        btnStop.disabled  = true;
        btnReset.disabled = false;
      }
    } catch (e) { clearState(); }
  }

  /* ── flush state on tab close / refresh ── */
  // We do NOT block navigation. Since localStorage saves on every tick, the
  // session survives a refresh perfectly. Blocking with e.preventDefault()
  // would show "Changes may not be saved" — an outright lie that causes panic.
  // Instead just flush saveState() once more so the stored snapshot is as
  // fresh as possible (rather than relying on the last tick up to 200ms ago).
  window.addEventListener('beforeunload', () => {
    if (running) saveState();
  });

  /* ── core timer tick ── */
  let _lastSavedElapsed = -1;
  function tick() {
    // Math.max(0, ...) guards against a backward system clock adjustment
    // that could produce a negative value and break the display ("00:00:-1").
    const newElapsed = Math.max(0, elapsedAtPause + Math.floor((Date.now() - runStartedAt) / 1000));
    timerEl.textContent = formatDisplay(newElapsed);
    elapsed = newElapsed;
    // Only write to localStorage when the second value actually changes.
    // The interval fires every 200ms for visual smoothness, but elapsed only
    // increments once per second — no point doing 5 identical writes per second.
    if (elapsed !== _lastSavedElapsed) {
      _lastSavedElapsed = elapsed;
      saveState();
    }
  }

  function startRunningUI() {
    running = true;
    timerEl.classList.add('running');
    timerEl.classList.remove('stopped');
    subEl.textContent = `started at ${formatTime12(sessionStart)}`;
    outputEl.classList.remove('visible');
    btnStart.disabled = true;
    btnStop.disabled  = false;
    btnReset.disabled = true;

    // 200ms interval: feels live, and uses real wall-clock math so
    // browser throttling of background tabs can never make it drift.
    interval = setInterval(tick, 200);
    tick(); // immediate first tick so display updates at once
  }

  /* ── button handlers ── */
  btnStart.addEventListener('click', () => {
    if (running) return;
    if (!sessionStart) sessionStart = new Date();
    runStartedAt = Date.now();
    // No saveState() here — startRunningUI() calls tick() immediately,
    // which saves the correct state with running:true already set.
    startRunningUI();
  });

  btnStop.addEventListener('click', () => {
    if (!running) return;
    clearInterval(interval);
    interval = null;
    running = false;

    // Freeze elapsed using wall-clock so the final value is exact.
    // Math.max(0,...) guards against a backward system-clock jump at stop time.
    const prevElapsedAtPause = elapsedAtPause;
    elapsed        = Math.max(0, elapsedAtPause + Math.floor((Date.now() - runStartedAt) / 1000));
    const segmentSecs = elapsed - prevElapsedAtPause; // ONLY the time since last Start
    elapsedAtPause = elapsed;
    runStartedAt   = null;

    timerEl.classList.remove('running');
    timerEl.classList.add('stopped');
    subEl.textContent = '';

    const endTime = new Date();
    outputEl.innerHTML =
      `You studied between <strong>${formatTime12(sessionStart)}</strong> and <strong>${formatTime12(endTime)}</strong>.<br>
       You studied for <strong>${formatDuration(elapsed)}</strong>. Every minute counts. Keep going! 🎯`;
    outputEl.classList.add('visible');

    btnStart.disabled = false;
    btnStop.disabled  = true;
    btnReset.disabled = false;

    logSession(segmentSecs); // record only this segment (not cumulative) in the log
    saveState();
  });

  btnReset.addEventListener('click', () => {
    clearInterval(interval);
    interval       = null;
    running        = false;
    elapsed        = 0;
    elapsedAtPause = 0;
    runStartedAt   = null;
    sessionStart   = null;

    timerEl.textContent = '00:00:00';
    timerEl.classList.remove('running', 'stopped');
    subEl.textContent = '';
    outputEl.classList.remove('visible');

    btnStart.disabled = false;
    btnStop.disabled  = true;
    btnReset.disabled = true;

    clearState(); // wipe saved state on explicit reset
    _lastSavedElapsed = -1; // ensure first tick of next session always saves
  });

  // Restore any previously saved session on page load
  restoreState();


  /* ══════════════════════════════════════════════
     SESSION LOG  — persists across all sessions
     Each entry: { date: 'YYYY-MM-DD', secs: number }
  ══════════════════════════════════════════════ */
  const LOG_KEY = 'gate-timer:sessionLog';

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function loadLog() {
    try {
      const raw = localStorage.getItem(LOG_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch(e) { return []; }
  }

  function saveLog(log) {
    try { localStorage.setItem(LOG_KEY, JSON.stringify(log)); } catch(e) {}
  }

  function logSession(secs) {
    if (secs < 5) return; // ignore accidental sub-5-second stops
    const log = loadLog();
    log.push({ date: todayStr(), secs });
    saveLog(log);
    updateStats();
  }

  /* ── stats computation ── */
  function getMondayStr(d) {
    const day = d.getDay(); // 0=Sun
    const diff = (day === 0 ? -6 : 1 - day);
    const mon = new Date(d);
    mon.setDate(d.getDate() + diff);
    return `${mon.getFullYear()}-${pad(mon.getMonth()+1)}-${pad(mon.getDate())}`;
  }

  function computeStats(log) {
    const today = todayStr();
    const now   = new Date();
    const monthPfx = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
    const weekMon  = getMondayStr(now);

    let todaySecs = 0, weekSecs = 0, monthSecs = 0;
    const dayTotals = {}; // date → secs, for average

    for (const entry of log) {
      if (!entry || typeof entry.secs !== 'number') continue;
      const s = entry.secs;
      if (entry.date === today)             todaySecs  += s;
      if (entry.date >= weekMon)            weekSecs   += s;
      if (entry.date.startsWith(monthPfx)) monthSecs  += s;
      dayTotals[entry.date] = (dayTotals[entry.date] || 0) + s;
    }

    const daysWithStudy = Object.keys(dayTotals).length;
    const allSecs = Object.values(dayTotals).reduce((a, b) => a + b, 0);
    const avgSecs = daysWithStudy > 0 ? Math.round(allSecs / daysWithStudy) : 0;

    return { todaySecs, weekSecs, monthSecs, avgSecs, daysWithStudy };
  }

  function formatHM(secs) {
    if (secs === 0) return '0h 0m';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    if (h === 0) return `${m}m`;
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  }

    }
  }
