<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE 2027 Study Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-elevated: #12121a;
            --card: #16161f;
            --border: #2a2a3a;
            --fg: #e8e8ed;
            --muted: #7a7a8a;
            --accent: #d4a853;
            --accent-dim: #b8923f;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        /* Subtle animated background */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(212, 168, 83, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212, 168, 83, 0.05) 0%, transparent 40%),
                var(--bg);
            z-index: -1;
        }
        
        /* Floating particles */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.2; }
            50% { transform: translateY(-100px) translateX(30px); opacity: 0.5; }
        }
        
        /* Timer glow effect */
        .timer-glow {
            text-shadow: 0 0 60px rgba(212, 168, 83, 0.3);
        }
        
        .timer-glow-active {
            animation: pulse-glow 2s infinite ease-in-out;
        }
        
        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 60px rgba(212, 168, 83, 0.3); }
            50% { text-shadow: 0 0 80px rgba(212, 168, 83, 0.5); }
        }
        
        /* Button styles */
        .btn {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            padding: 12px 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        
        .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: var(--bg);
        }
        
        .btn-primary:hover {
            background: var(--accent-dim);
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: var(--card);
            color: var(--fg);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: var(--bg-elevated);
            border-color: var(--accent);
        }
        
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        
        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.1);
        }
        
        /* Card styles */
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            border-color: rgba(212, 168, 83, 0.3);
        }
        
        /* Quote animation */
        .quote-container {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        .quote-fade {
            opacity: 0;
        }
        
        /* Status badge */
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        /* Session message */
        .session-message {
            animation: slideUp 0.4s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Countdown flip animation */
        .countdown-unit {
            position: relative;
        }
        
        /* Scrollbar hidden but functional */
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
        
        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .particle,
            .timer-glow-active,
            .quote-container,
            .session-message {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
        
        function formatTimeShort(ms) {
            const totalMinutes = Math.floor(ms / 60000);
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;
            return `${hours}h ${minutes}m`;
        }
        
        function formatTimeReadable(date) {
            return date.toLocaleTimeString('en-IN', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true 
            });
        }
        
        function getTodayKey() {
            return new Date().toISOString().split('T')[0];
        }
        
        function getWeekStart() {
            const now = new Date();
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(now.setDate(diff));
        }
        
        function getMonthStart() {
            const now = new Date();
            return new Date(now.getFullYear(), now.getMonth(), 1);
        }

            try {
                const data = localStorage.getItem('gate_study_sessions');
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }
        
        function saveSession(session) {
            const sessions = getSessions();
            sessions.push(session);
            localStorage.setItem('gate_study_sessions', JSON.stringify(sessions));
        }
        
        function saveTimerState() {
            localStorage.setItem('gate_timer_state', JSON.stringify(timerState));
        }
        
        function loadTimerState() {
            try {
                const saved = localStorage.getItem('gate_timer_state');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    timerState.isRunning = parsed.isRunning || false;
                    timerState.isPaused = parsed.isPaused || false;
                    timerState.startTime = parsed.startTime ? new Date(parsed.startTime) : null;
                    timerState.elapsedBeforePause = parsed.elapsedBeforePause || 0;
                    timerState.currentSessionStart = parsed.currentSessionStart ? new Date(parsed.currentSessionStart) : null;

            }
        }
        
        // ==========================================
        // STATS CALCULATIONS
        // ==========================================
        
        function calculateStats() {
            const sessions = getSessions();
            const now = new Date();
            const todayKey = getTodayKey();
            const weekStart = getWeekStart();
            const monthStart = getMonthStart();
            
            let todayTotal = 0;
            let weekTotal = 0;
            let monthTotal = 0;
            let monthDays = new Set();
            
            sessions.forEach(session => {
                const sessionDate = new Date(session.start);
                const sessionKey = session.start.split('T')[0];
                
                // Today
                if (sessionKey === todayKey) {
                    todayTotal += session.duration;
                }
                
                // This week
                if (sessionDate >= weekStart) {
                    weekTotal += session.duration;
                }
                
                // This month
                if (sessionDate >= monthStart) {
                    monthTotal += session.duration;
                    monthDays.add(sessionKey);
                }
            });
            
            // Add current session if running
            if (timerState.isRunning && timerState.startTime) {
                const currentElapsed = timerState.elapsedBeforePause + (Date.now() - timerState.startTime.getTime());
                
                // For today
                if (timerState.currentSessionStart) {
                    const sessionKey = timerState.currentSessionStart.toISOString().split('T')[0];
                    if (sessionKey === todayKey) {
                        todayTotal += currentElapsed;
                    }
                    if (timerState.currentSessionStart >= weekStart) {
                        weekTotal += currentElapsed;
                    }
                    if (timerState.currentSessionStart >= monthStart) {
                        monthTotal += currentElapsed;
                        monthDays.add(sessionKey);
                    }
                }
            }
            
            const avgDaily = monthDays.size > 0 ? monthTotal / monthDays.size : 0;
            
            return { todayTotal, weekTotal, monthTotal, avgDaily };
        }
        
        function getStatusMessage(ms) {
            const hours = ms / (1000 * 60 * 60);
            
            if (hours < 5) {
                return { text: 'Dusht & Paapi', class: 'bg-red-500/20 text-red-400 border border-red-500/30' };
            } else if (hours < 8) {
                return { text: 'Good. Keep Going.', class: 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30' };
            } else if (hours < 11) {
                return { text: 'Very good. But need more.', class: 'bg-blue-500/20 text-blue-400 border border-blue-500/30' };
            } else {
                return { text: 'Ranker!', class: 'bg-green-500/20 text-green-400 border border-green-500/30' };
            }
        }
        
        // ==========================================
        // UI UPDATE FUNCTIONS
        // ==========================================
        
        function updateStats() {
            const stats = calculateStats();
            
            todayTimeEl.textContent = formatTimeShort(stats.todayTotal);
            weekTimeEl.textContent = formatTimeShort(stats.weekTotal);
            monthTimeEl.textContent = formatTimeShort(stats.monthTotal);
            avgTimeEl.textContent = formatTimeShort(stats.avgDaily);
            
            const status = getStatusMessage(stats.todayTotal);
            todayStatusEl.textContent = status.text;
            todayStatusEl.className = `status-badge ${status.class}`;
        }
        
        function updateTimerDisplay() {
            if (!timerState.isRunning || timerState.isPaused) {
                const elapsed = timerState.elapsedBeforePause;
                timerDisplay.textContent = formatTime(elapsed);
                return;
            }
            
            const elapsed = timerState.elapsedBeforePause + (Date.now() - timerState.startTime.getTime());
            timerDisplay.textContent = formatTime(elapsed);
        }
        
        function updateCountdown() {
            const now = new Date();
            const diff = GATE_DATE - now;
            
            if (diff <= 0) {
                countdownEl.textContent = 'GATE Day!';
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            countdownEl.textContent = `${days}d ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
        
        function showQuote() {
            const quote = quotes[currentQuoteIndex];
            quoteTextEl.innerHTML = `<span class="text-[var(--accent)] font-medium">${quote.author}</span>, "${quote.text}"`;
            currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
        }
        
        function cycleQuote() {
            quoteContainer.classList.add('quote-fade');
            setTimeout(() => {
                showQuote();
                quoteContainer.classList.remove('quote-fade');
            }, 500);
        }
        
        function updateSessionInfo() {
            if (timerState.currentSessionStart && timerState.isRunning) {
                sessionInfo.textContent = `Started at ${formatTimeReadable(timerState.currentSessionStart)}`;
            } else {
                sessionInfo.textContent = '';
            }
        }
        
        // ==========================================
        // TIMER CONTROL FUNCTIONS
        // ==========================================
        
        function startTimer() {
            timerState.isRunning = true;
            timerState.isPaused = false;
            timerState.startTime = new Date();
            timerState.elapsedBeforePause = 0;
            timerState.currentSessionStart = new Date();
            
            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            stopBtn.classList.remove('hidden');
            resumeBtn.classList.add('hidden');
            
            timerDisplay.classList.add('timer-glow-active');
            sessionMessage.innerHTML = '';
            
            saveTimerState();
            updateSessionInfo();
            
            if (!timerInterval) {
                timerInterval = setInterval(() => {
                    updateTimerDisplay();
                    updateStats();
                }, 1000);
            }
        }
        
        function pauseTimer() {
            if (!timerState.isRunning) return;
            
            timerState.elapsedBeforePause += Date.now() - timerState.startTime.getTime();
            timerState.isPaused = true;
            timerState.isRunning = false;
            
            pauseBtn.classList.add('hidden');
            resumeBtn.classList.remove('hidden');
            
            timerDisplay.classList.remove('timer-glow-active');
            
            saveTimerState();
        }
        
        function resumeTimer() {
            timerState.isRunning = true;
            timerState.isPaused = false;
            timerState.startTime = new Date();
            
            resumeBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            
            timerDisplay.classList.add('timer-glow-active');
            
            saveTimerState();
        }
        
        function stopTimer() {
            if (!timerState.currentSessionStart) return;
            
            const endTime = new Date();
            const duration = timerState.elapsedBeforePause + (timerState.isRunning ? (Date.now() - timerState.startTime.getTime()) : 0);
            
            // Save session
            const session = {
                start: timerState.currentSessionStart.toISOString(),
                end: endTime.toISOString(),
                duration: duration
            };
            saveSession(session);
            
            // Show session message
            sessionMessage.innerHTML = `
                <div class="session-message stat-card inline-block">
                    <p class="text-[var(--fg)]">You studied between <span class="text-[var(--accent)] font-semibold">${formatTimeReadable(timerState.currentSessionStart)}</span> and <span class="text-[var(--accent)] font-semibold">${formatTimeReadable(endTime)}</span>.</p>
                    <p class="text-[var(--muted)] mt-1">You studied for <span class="text-[var(--fg)] font-semibold">${formatTimeShort(duration)}</span>.</p>
                </div>
            `;
            
            // Reset state
            timerState.isRunning = false;
            timerState.isPaused = false;
            timerState.startTime = null;
            timerState.elapsedBeforePause = 0;
            timerState.currentSessionStart = null;
            
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            resumeBtn.classList.add('hidden');
            stopBtn.classList.add('hidden');
            
            timerDisplay.classList.remove('timer-glow-active');
            timerDisplay.textContent = '00:00:00';
            sessionInfo.textContent = '';
            
            saveTimerState();
            updateStats();
        }
        
        // ==========================================
        // INITIALIZATION
        // ==========================================
        
        function init() {
            // Initialize DOM elements
            countdownEl = document.getElementById('countdown');
            timerDisplay = document.getElementById('timerDisplay');
            sessionInfo = document.getElementById('sessionInfo');
            sessionMessage = document.getElementById('sessionMessage');
            startBtn = document.getElementById('startBtn');
            pauseBtn = document.getElementById('pauseBtn');
            resumeBtn = document.getElementById('resumeBtn');
            stopBtn = document.getElementById('stopBtn');
            todayTimeEl = document.getElementById('todayTime');
            todayStatusEl = document.getElementById('todayStatus');
            weekTimeEl = document.getElementById('weekTime');
            monthTimeEl = document.getElementById('monthTime');
            avgTimeEl = document.getElementById('avgTime');
            quoteTextEl = document.getElementById('quoteText');
            quoteContainer = document.getElementById('quoteContainer');
            
            // Load saved state
            loadTimerState();
            
            // Setup event listeners
            startBtn.addEventListener('click', startTimer);
            pauseBtn.addEventListener('click', pauseTimer);
            resumeBtn.addEventListener('click', resumeTimer);
            stopBtn.addEventListener('click', stopTimer);
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (!timerState.isRunning && !timerState.isPaused) {
                        startTimer();
                    } else if (timerState.isRunning && !timerState.isPaused) {
                        pauseTimer();
                    } else if (timerState.isPaused) {
                        resumeTimer();
                    }
                } else if (e.code === 'Escape' && (timerState.isRunning || timerState.isPaused)) {
                    stopTimer();
                }
            });
            
            // Restore timer state if was running
            if (timerState.isRunning || timerState.isPaused) {
                startBtn.classList.add('hidden');
                
                if (timerState.isPaused) {
                    resumeBtn.classList.remove('hidden');
                } else {
                    pauseBtn.classList.remove('hidden');
                    timerDisplay.classList.add('timer-glow-active');
                }
                
                stopBtn.classList.remove('hidden');
                updateSessionInfo();
                
                timerInterval = setInterval(() => {
                    updateTimerDisplay();
                    updateStats();
                }, 1000);
            }
            
            // Initial updates
            updateCountdown();
            updateStats();
            updateTimerDisplay();
            showQuote();
            
            // Start intervals
            countdownInterval = setInterval(updateCountdown, 1000);
            quoteInterval = setInterval(cycleQuote, 15000);
            
            // Handle visibility change for background tabs
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    updateTimerDisplay();
                    updateStats();
                    updateCountdown();
                }
            });
            
            // Periodic state save while running
            setInterval(() => {
                if (timerState.isRunning || timerState.isPaused) {
                    saveTimerState();
                }
            }, 5000);
        }
        
        // Wait for DOM to be ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
