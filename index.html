<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Timer — GATE CS & DA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #09090e;
      --surface:   #111119;
      --border:    #1e1e2e;
      --gold:      #c9a84c;
      --gold-dim:  #8a6f30;
      --text:      #dcd9d0;
      --muted:     #55556a;
      --white:     #f0ede6;
      --red:       #b85450;
      --green:     #5a8a6a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 24px 60px;
      position: relative;
    }

    /* ── subtle background grain ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── GATE countdown bar ── */
    #countdown-bar {
      width: 100%;
      max-width: 680px;
      margin-top: 36px;
      padding: 14px 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    #countdown-bar .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #countdown-bar .days {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    #countdown-bar .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border);
    }

    /* ── main card ── */
    #card {
      width: 100%;
      max-width: 680px;
      margin-top: 20px;
      padding: 60px 48px 52px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 15px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
    }

    /* ── timer display ── */
    #timer {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(80px, 18vw, 130px);
      letter-spacing: -0.01em;
      color: var(--white);
      line-height: 1;
      transition: color 0.4s ease;
      user-select: none;
    }

    #timer.running { color: var(--white); }
    #timer.stopped { color: var(--gold); }

    .timer-sub {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      height: 16px;
      transition: opacity 0.3s;
    }

    /* ── divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 44px 0 40px;
    }

    /* ── buttons ── */
    #controls {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 14px 32px;
      background: transparent;
      color: var(--muted);
    }

    button:hover { border-color: var(--muted); color: var(--text); }

    #btn-start {
      border-color: var(--gold-dim);
      color: var(--gold);
      padding: 16px 48px;
      font-size: 13px;
    }
    #btn-start:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); }

    #btn-stop  { color: var(--red); border-color: #4a2828; }
    #btn-stop:hover  { background: var(--red); color: var(--white); border-color: var(--red); }

    #btn-reset { color: var(--muted); }
    #btn-reset:hover { border-color: var(--muted); }

    button:disabled {
      opacity: 0.25;
      pointer-events: none;
    }

    /* ── output message ── */
    #output {
      margin-top: 36px;
      width: 100%;
      padding: 20px 24px;
      border: 1px solid var(--green);
      border-radius: 4px;
      background: rgba(90, 138, 106, 0.07);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: #8abf9a;
      display: none;
      text-align: center;
      letter-spacing: 0.01em;
    }

    #output.visible { display: block; animation: fadeIn 0.5s ease; }

    #output strong {
      color: #aad4b4;
      font-weight: 500;
    }

    /* ── quotes ── */
    #quotes {
      width: 100%;
      max-width: 680px;
      margin-top: 20px;
      padding: 28px 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    #quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.6;
      font-style: italic;
      transition: opacity 0.5s;
    }

    #quote-author {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      transition: opacity 0.5s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-out { opacity: 0 !important; }
  </style>
</head>
<body>

  <!-- GATE Countdown -->
  <div id="countdown-bar">
    <span class="label">GATE 2027 CS &amp; DA</span>
    <span class="dot"></span>
    <span class="days" id="gate-days">— days remaining</span>
    <span class="dot"></span>
    <span class="label">Stay the course</span>
  </div>

  <!-- Main Card -->
  <div id="card">
    <p class="page-title">Study Timer</p>

    <div id="timer">00:00:00</div>
    <div class="timer-sub" id="timer-sub"></div>

    <div class="divider"></div>

    <div id="controls">
      <button id="btn-stop"  disabled>Stop</button>
      <button id="btn-start">Start</button>
      <button id="btn-reset" disabled>Reset</button>
    </div>

    <div id="output"></div>
  </div>

  <!-- Quote -->
  <div id="quotes">
    <div id="quote-text"></div>
    <div id="quote-author"></div>
  </div>

<script>
  /* ── GATE countdown ── */
  (function() {
    // GATE 2027 — approximate date (first Saturday of February 2027)
    const gateDate = new Date('2027-02-06T09:00:00+05:30');
    function updateCountdown() {
      const now = new Date();
      const diff = gateDate - now;
      if (diff <= 0) {
        document.getElementById('gate-days').textContent = 'GATE day is here!';
        return;
      }
      const days  = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins  = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      document.getElementById('gate-days').textContent =
        `${days}d ${hours}h ${mins}m remaining`;
    }
    updateCountdown();
    // BUG FIX: Was 60000ms — if the tab stayed open across midnight the
    // display could be wrong for up to a minute. Now updates every second.
    // ID is stored so it can be cleared if needed (same fix as quote interval).
    const _gateInterval = setInterval(updateCountdown, 1000);
  })();

  /* ── Timer logic ── */
  const STORAGE_KEY = 'studyTimerState';

  let interval       = null;
  let elapsed        = 0;      // total seconds accumulated across all pauses
  let elapsedAtPause = 0;      // snapshot of elapsed the moment we paused
  let runStartedAt   = null;   // Date.now() value when the current run segment began
  let sessionStart   = null;   // Date object: very first Start of this session
  let running        = false;

  const timerEl  = document.getElementById('timer');
  const subEl    = document.getElementById('timer-sub');
  const outputEl = document.getElementById('output');
  const btnStart = document.getElementById('btn-start');
  const btnStop  = document.getElementById('btn-stop');
  const btnReset = document.getElementById('btn-reset');

  /* ── helpers ── */
  function pad(n) { return String(n).padStart(2, '0'); }

  function formatDisplay(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    return `${pad(h)}:${pad(m)}:${pad(s % 60)}`;
  }

  function formatTime12(date) {
    let h = date.getHours(), m = date.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${pad(m)} ${ampm}`;
  }

  function formatDuration(s) {
    if (s < 60)   return `${s} second${s !== 1 ? 's' : ''}`;
    if (s < 3600) {
      const m = Math.floor(s / 60), sec = s % 60;
      return sec ? `${m} min ${sec} sec` : `${m} minute${m !== 1 ? 's' : ''}`;
    }
    const h   = Math.floor(s / 3600);
    const m   = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    let str = `${h} hour${h !== 1 ? 's' : ''}`;
    if (m)   str += ` ${m} min`;
    if (sec) str += ` ${sec} sec`;
    return str;
  }

  /* ── localStorage persistence ── */
  // BUG FIX: Previously, a page refresh or accidental tab close wiped the
  // entire session. Now we save state on every tick so it survives.

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        elapsedAtPause,
        runStartedAt,          // null when paused, a timestamp when running
        sessionStart: sessionStart ? sessionStart.getTime() : null,
        running
      }));
    } catch (e) { /* localStorage unavailable (private mode etc.) — degrade gracefully */ }
  }

  function clearState() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  }

  function restoreState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const s = JSON.parse(raw);

      elapsedAtPause = s.elapsedAtPause || 0;
      sessionStart   = s.sessionStart ? new Date(s.sessionStart) : null;

      if (s.running && s.runStartedAt) {
        // The timer was running when the page closed/refreshed.
        // Recompute how much time has passed since then.
        runStartedAt = s.runStartedAt;
        elapsed      = elapsedAtPause + Math.floor((Date.now() - runStartedAt) / 1000);
        startRunningUI();
      } else if (sessionStart && s.running === false) {
        // Timer was paused — restore the frozen display, even if the elapsed
        // time is exactly zero.
        elapsed = elapsedAtPause;
        timerEl.textContent = formatDisplay(elapsed);
        timerEl.classList.add('stopped');
        subEl.textContent = '';
        const dur = formatDuration(elapsed);
        outputEl.innerHTML =
          `Session restored. You have studied for <strong>${dur}</strong> so far. Keep going! 🎯`;
        outputEl.classList.add('visible');
        btnStart.disabled = false;
        btnStop.disabled  = true;
        btnReset.disabled = false;
      }
    } catch (e) { clearState(); }
  }

  /* ── flush state on tab close / refresh ── */
  // We do NOT block navigation. Since localStorage saves on every tick, the
  // session survives a refresh perfectly. Blocking with e.preventDefault()
  // would show "Changes may not be saved" — an outright lie that causes panic.
  // Instead just flush saveState() once more so the stored snapshot is as
  // fresh as possible (rather than relying on the last tick up to 200ms ago).
  window.addEventListener('beforeunload', () => {
    if (running) saveState();
  });

  /* ── core timer tick ── */
  function tick() {
    elapsed = elapsedAtPause + Math.floor((Date.now() - runStartedAt) / 1000);
    timerEl.textContent = formatDisplay(elapsed);
    saveState(); // persist on every tick — survives refresh
  }

  function startRunningUI() {
    if (interval) clearInterval(interval);
    running = true;
    timerEl.classList.add('running');
    timerEl.classList.remove('stopped');
    subEl.textContent = `started at ${formatTime12(sessionStart)}`;
    outputEl.classList.remove('visible');
    btnStart.disabled = true;
    btnStop.disabled  = false;
    btnReset.disabled = true;

    // 200ms interval: feels live, and uses real wall-clock math so
    // browser throttling of background tabs can never make it drift.
    interval = setInterval(tick, 200);
    tick(); // immediate first tick so display updates at once
    saveState(); // persist the active state immediately
  }

  /* ── button handlers ── */
  btnStart.addEventListener('click', () => {
    if (running) return;
    if (!sessionStart) sessionStart = new Date();
    runStartedAt = Date.now();
    startRunningUI();
  });

  btnStop.addEventListener('click', () => {
    if (!running) return;
    clearInterval(interval);
    running = false;

    // Freeze elapsed using wall-clock so the final value is exact.
    elapsed        = elapsedAtPause + Math.floor((Date.now() - runStartedAt) / 1000);
    elapsedAtPause = elapsed;
    runStartedAt   = null;

    timerEl.classList.remove('running');
    timerEl.classList.add('stopped');
    subEl.textContent = '';

    const endTime = new Date();
    outputEl.innerHTML =
      `You studied between <strong>${formatTime12(sessionStart)}</strong> and <strong>${formatTime12(endTime)}</strong>.<br>
       You studied for <strong>${formatDuration(elapsed)}</strong>. Every minute counts. Keep going! 🎯`;
    outputEl.classList.add('visible');

    btnStart.disabled = false;
    btnStop.disabled  = true;
    btnReset.disabled = false;

    saveState();
  });

  btnReset.addEventListener('click', () => {
    clearInterval(interval);
    running        = false;
    elapsed        = 0;
    elapsedAtPause = 0;
    runStartedAt   = null;
    sessionStart   = null;

    timerEl.textContent = '00:00:00';
    timerEl.classList.remove('running', 'stopped');
    subEl.textContent = '';
    outputEl.classList.remove('visible');

    btnStart.disabled = false;
    btnStop.disabled  = true;
    btnReset.disabled = true;

    clearState(); // wipe saved state on explicit reset
  });

  // Restore any previously saved session on page load
  restoreState();

  /* ── Quotes ── */
  const quotes = [

    { text: "Bhajan Shri Ji ke liye, Shri Ji ke dwara hi hoga.", author: "Gurudev" },
    { text: "Sadhan bhi priyalal, sadhya bhi priyalal.", author: "Gurudev" },
    { text: "Sharanagati matlab — saari bhar unki, teri koi nahi.", author: "Gurudev" },
    { text: "Nirantar naam japa — Radha Radha... yahi tera kaam hai.", author: "Gurudev" },
    { text: "Chinta karna matlab Radha Rani par vishwas nahi karna.", author: "Gurudev" },

    { text: "Tera bhaar mujhe de de — tu khali ho ja.", author: "Radha Rani" },

    { text: "Gurudev ne raah dikhaai, Shri Ji raah hain — main sirf chalun.", author: "Shriyash" },
    { text: "Mein kuch bhi nahi — Shri Ji sab kuch hain.", author: "Shriyash" },
    { text: "Unpe chhodna weakness nahi — sabse badi samajhdaari hai.", author: "Shriyash" },
    { text: "Mera best bhi unki kripa hai — apna nahi keh sakta.", author: "Shriyash" },
    { text: "Unka naam lena — yahi meri consistency hai.", author: "Shriyash" },
    { text: "Agar main kuch bhi achieve karun — Shri Ji ne kiya, main nahi.", author: "Shriyash" },
    { text: "Ghabrana nahi — Shri Ji hain na.", author: "Shriyash" },
    { text: "Unke bina ek pal bhi theek se nahi guzarta.", author: "Shriyash" },
    { text: "Unka naam meri sabse badi tayyaari hai.", author: "Shriyash" },
    { text: "Apni kamzori dekhta hoon toh — unki zaroorat aur zyada lagti hai.", author: "Shriyash" },
  ];

  let currentQuoteIndex = Math.floor(Math.random() * quotes.length);

  function showQuote(index) {
    const qText   = document.getElementById('quote-text');
    const qAuthor = document.getElementById('quote-author');
    qText.classList.add('fade-out');
    qAuthor.classList.add('fade-out');
    setTimeout(() => {
      qText.textContent   = `"${quotes[index].text}"`;
      qAuthor.textContent = `— ${quotes[index].author}`;
      qText.classList.remove('fade-out');
      qAuthor.classList.remove('fade-out');
    }, 500);
  }

  showQuote(currentQuoteIndex);

  // BUG FIX: Previously the interval ID was thrown away, making it
  // impossible to ever stop. Now stored so it can be cleared if needed.
  const quoteInterval = setInterval(() => {
    currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
    showQuote(currentQuoteIndex);
  }, 12000);
</script>
